---
# tasks file for aap-version
- name: Validate AAP Token with Version Awareness
  block:
    - name: Probe base AAP API to detect routing paths
      ansible.builtin.uri:
        url: "{{ controller_url }}/api/"
        method: GET
        headers:
          Content-Type: "application/json"
        validate_certs: "{{ validate_aap_certs | default(false) }}"
      register: aap_api_base
      ignore_errors: true

    - name: Determine the correct /me endpoint URL based on API structure
      ansible.builtin.set_fact:
        aap_me_endpoint: >-
          {% if aap_api_base.json is defined
             and aap_api_base.json.apis is defined
             and 'controller' in aap_api_base.json.apis.keys() | string %}
          {{ controller_url }}/api/controller/v2/me/
          {% else %}
          {{ controller_url }}/api/v2/me/
          {% endif %}

    - name: Test AAP token validity against detected endpoint
      ansible.builtin.uri:
        url: "{{ aap_me_endpoint | trim }}"
        method: GET
        headers:
          Authorization: "Bearer {{ controller_token }}"
          Content-Type: "application/json"
        validate_certs: "{{ validate_aap_certs | default(false) }}"
      register: aap_token_test
      ignore_errors: true

    # - name: Debug token
    #  ansible.builtin.debug:
    #    var: aap_token_test

    - name: Assert that the AAP token is valid
      ansible.builtin.assert:
        that:
          - aap_token_test.status == 200
          - aap_token_test.json.results is defined
          - aap_token_test.json.results | length > 0
          - aap_token_test.json.results[0].username is defined
        msg: "Looks like your token may have expired. Received an HTTP status {{ aap_token_test.status }} instead of 200."
        # Uncomment fail_msg and success_msg for AAP 2.7 and above
        # fail_msg: |
          # AAP Token Validation Failed!
          # Attempted Endpoint: {{ aap_me_endpoint | trim }}
          # HTTP Status Code: {{ aap_token_test.status | default('No Response') }}
          # Error Details: {{ aap_token_test.json | default(aap_token_test.msg | default('Could not reach the AAP controller host.')) }}
        # success_msg: "AAP token is valid on this platform version. Authenticated as: {{ aap_token_test.json.results[0].username }}"

    - name: Determine the correct /api endpoint URL based on API structure
      ansible.builtin.set_fact:
        controller_api_url: >-
          {% if aap_api_base.json is defined
             and aap_api_base.json.apis is defined
             and 'controller' in aap_api_base.json.apis.keys() | string %}
            api/controller/v2
          {% else %}
            api/v2
          {% endif %}
