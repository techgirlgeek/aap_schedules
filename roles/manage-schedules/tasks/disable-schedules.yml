---
- name: Backup and Remove existing Sched IDs File
  when: sched_ids_file.stat.exists and sched_ids_file.stat.isreg
  block:
    - name: Assert that the file exists and is a regular file
      ansible.builtin.assert:
        that:
          - sched_ids_file.stat.exists
          - sched_ids_file.stat.isreg
        fail_msg: "The schedule IDS file does not exist or is not a regular file!"
        success_msg: "Schedule IDS file found, proceeding with backing up ID file and disabling schedules."

    - name: Copy Sched ID file if exists
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/sched_ids_{{ env }}.txt"
        dest: "{{ playbook_dir }}/files/sched_ids_{{ env }}.txt.bak.{{ lookup('ansible.builtin.pipe', 'date +%Y-%m-%d_%T') }}"
        remote_src: true
        mode: '0644'

    - name: Remove Sched IDs file if exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/files/sched_ids_{{ env }}.txt"
        state: absent

- name: Fetch all enabled schedules
  ansible.builtin.uri:
    url: >-
      {{ controller_url }}/{{ aap_api_endpoint | trim }}/schedules/?page_size={{ aap_schedules_count
      | default(250) }}&enabled=true
    method: GET
    status_code: 200
    headers:
      Authorization: "Bearer {{ controller_token }}"
      Content-Type: "application/json"
  register: enabled_schedules

- name: Create file containing enabled schedule IDs
  ansible.builtin.lineinfile:
    line: "{{ item.id }}"
    path: "{{ playbook_dir }}/files/sched_ids_{{ env }}.txt"
    create: true
    mode: '0644'
  loop:
    "{{ enabled_schedules.json.results }}"

- name: Disable each schedule found
  ansible.controller.schedule:
    controller_host: "{{ controller_url }}"
    controller_oauthtoken: "{{ controller_token }}"
    name: "{{ item.name }}"
    unified_job_template: "{{ item.summary_fields.unified_job_template.name }}"
    enabled: false
    state: present
  loop: "{{ enabled_schedules.json.results }}"
  when: enabled_schedules.json.count > 0
  loop_control:
    label: "{{ item.name }}"
