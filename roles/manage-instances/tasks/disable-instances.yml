---
# tasks file for manage-instances
- name: Look for existing Instance IDs File
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/files/inst_ids_{{ env }}.txt"
  register: inst_ids_file

- name: Backup and Remove existing Instance IDs File
  when: inst_ids_file.stat.exists and inst_ids_file.stat.isreg
  block:
    - name: Copy Instance ID file if exists
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/inst_ids_{{ env }}.txt"
        dest: "{{ playbook_dir }}/files/inst_ids_{{ env }}.txt.bak.{{ lookup('ansible.builtin.pipe', 'date +%Y-%m-%d') }}"
        remote_src: true
        mode: '0644'

    - name: Remove Instance IDs file if exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/files/inst_ids_{{ env }}.txt"
        state: absent

- name: Fetch all enabled instances
  ansible.builtin.uri:
    url: "{{ controller_url }}/{{ controller_api_url | trim }}/instances/?enabled=true"
    method: GET
    status_code: 200
    headers:
      Authorization: "Bearer {{ controller_token }}"
      Content-Type: "application/json"
  register: controller_instances

- name: Display instance names and IDs
  ansible.builtin.debug:
    msg: "Instance Name: {{ item.hostname }}, ID: {{ item.id }}"
  loop: "{{ controller_instances.json.results }}"
  loop_control:
    label: "{{ item.hostname }}"

- name: Create file containing enabled instance IDs
  ansible.builtin.lineinfile:
    line: "{{ item.id }}"
    path: "{{ playbook_dir }}/files/inst_ids_{{ env }}.txt"
    create: true
    mode: '0644'
  loop:
    "{{ controller_instances.json.results }}"

- name: Disable each instance found
  ansible.controller.instance:
    controller_host: "{{ controller_url }}"
    controller_oauthtoken: "{{ controller_token }}"
    hostname: "{{ item.hostname }}"
    enabled: false
  loop: "{{ controller_instances.json.results }}"
  when: controller_instances.json.count > 0
  loop_control:
    label: "{{ item.hostname }}"
