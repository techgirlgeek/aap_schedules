---
- name: Debug env_var
  ansible.builtin.debug:
    var: env
- name: debug something else
  ansible.builtin.debug:
    var: controller_token

# tasks file for aap-version
- name: Query the Controller configuration endpoint
  ansible.builtin.uri:
    url: "{{ controller_url }}/api/"
    method: GET
    status_code: 200
    headers:
      Authorization: "Bearer {{ controller_token }}"
      Content-Type: "application/json"
  register: controller_config

- name: Set aap_version fact
  ansible.builtin.set_fact:
    aap_version: "{{ controller_config.x_api_product_version }}"

- name: Set controller api based on aap_version
  ansible.builtin.set_fact:
    controller_api_url: >-
      {% if aap_version is ansible.builtin.contains("4.5") %}
        api/v2
      {% elif aap_version is ansible.builtin.contains("2.") %}
        api/controller/v2
      {% endif %}
