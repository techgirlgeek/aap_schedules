---
- name: Enable controller schedules and instances post maintenance
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vaults/{{ env | default('all') }}.yml
  vars:
    enable_env: true
  tasks:
    - name: Check AAP Version
      ansible.builtin.include_role:
        name: aap-version
    - name: Disable Instances
      ansible.builtin.include_role:
        name: manage-instances
        tasks_from: enable-instances.yml
      when: enable_env is defined and enable_env | bool
    - name: Enable Schedules
      ansible.builtin.include_role:
        name: manage-schedules
        tasks_from: enable-schedules.yml
      when: enable_env is defined and enable_env | bool
