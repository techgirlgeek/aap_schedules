---
- name: Manage AAP Replicas
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vaults/{{ env | default('all') }}.yml
  tasks:
    - name: Check AAP Version
      ansible.builtin.include_role:
        name: aap-version
    - name: Manage Replicas
      ansible.builtin.include_role:
        name: manage-replicas
      when: disable_env is defined and disable_env | bool
    - name: Enable Replicas 2.6+
      ansible.builtin.include_role:
        name: manage-replicas
        tasks_from: enable-replicas.yml
      when: enable_env is defined and enable_env | bool
